<html lang="en">
<head>

<title>HaxReplay Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Score bar ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ */
  #score-bar {
    background: #111827;
    border-bottom: 1px solid #1f2937;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    height: 52px;
    flex-shrink: 0;
    position: relative;
  }
  .team-block {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
  }
  .team-name {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .team-score {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .red-c  { color: #FF4444; }
  .blue-c { color: #4488FF; }
  .score-sep {
    font-size: 28px;
    font-weight: 300;
    color: #374151;
    padding: 0 16px;
  }
  #status {
    position: absolute;
    right: 24px;
    font-size: 11px;
    color: #6b7280;
    letter-spacing: 0.5px;
  }

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Canvas area ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ */
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    background: #0d1117;
  }
  canvas { display: block; }

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Sidebar ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ */
  #sidebar {
    position: absolute;
    right: 0; top: 0;
    width: 152px;
    height: 100%;
    background: rgba(13,17,23,0.92);
    border-left: 1px solid #1f2937;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #4b5563;
    padding: 2px 8px 6px;
  }
  .player-chip {
    padding: 5px 8px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-chip.red  {
    background: rgba(255,68,68,0.1);
    color: #ff6b6b;
    border: 1px solid rgba(255,68,68,0.25);
  }
  .player-chip.blue {
    background: rgba(68,136,255,0.1);
    color: #6ba4ff;
    border: 1px solid rgba(68,136,255,0.25);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Goal flash ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ */
  #goal-flash {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 6px;
    text-shadow: 0 0 40px currentColor, 0 0 80px currentColor;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 20;
  }
  #goal-flash.show { opacity: 1; }

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Controls ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ */
  #controls {
    background: #111827;
    border-top: 1px solid #1f2937;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    height: 52px;
  }
  #btn-play {
    background: #1d4ed8;
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 0 16px;
    height: 32px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #btn-play:hover { background: #2563eb; }
  #btn-play.active { background: #059669; }
  #seek {
    flex: 1;
    height: 4px;
    cursor: pointer;
    accent-color: #3b82f6;
    border-radius: 2px;
  }
  #time-label {
    font-size: 11px;
    color: #9ca3af;
    min-width: 116px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  #speed-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #9ca3af;
    flex-shrink: 0;
  }
  select {
    background: #1f2937;
    border: 1px solid #374151;
    color: #e5e7eb;
    border-radius: 6px;
    padding: 4px 6px;
    cursor: pointer;
    font-size: 11px;
  }
</style>
</head>
<body>

<!-- Score bar -->
<div id="score-bar">
  <div class="team-block">
    <span class="team-name red-c">Red</span>
    <span class="team-score red-c" id="score-red">0</span>
  </div>
  <span class="score-sep">Гўв‚¬вЂњ</span>
  <div class="team-block">
    <span class="team-score blue-c" id="score-blue">0</span>
    <span class="team-name blue-c">Blue</span>
  </div>
  <div id="status">ConnectingГўв‚¬В¦</div>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="sidebar"></div>
  <div id="goal-flash"></div>
</div>

<!-- Controls -->
<div id="controls">
  <button id="btn-play" onclick="togglePlay()">ГўвЂ“В¶ Play</button>
  <input id="seek" type="range" min="0" max="1" value="0" step="1"
         oninput="onSeekInput(this.value)" onchange="onSeekCommit(this.value)">
  <span id="time-label">0:00 / 0:00</span>
  <div id="speed-wrap">
    <span>Speed</span>
    <select id="speed" onchange="setSpeed(this.value)">
      <option value="0.25">0.25ГѓвЂ”</option>
      <option value="0.5">0.5ГѓвЂ”</option>
      <option value="1" selected>1ГѓвЂ”</option>
      <option value="2">2ГѓвЂ”</option>
      <option value="4">4ГѓвЂ”</option>
      <option value="8">8ГѓвЂ”</option>
    </select>
  </div>
</div>

<script>

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// HaxBall "Big" stadium approximate physics units
const FIELD_W = 760, FIELD_H = 520;
const GOAL_H  = 100;                // half = 50 each side
const GOAL_D  = 45;                 // goal depth
const MARGIN  = 50;                 // space around field on canvas

let scale = 1;

function resize() {
  const wrap    = document.getElementById('canvas-wrap');
  const sidebar = document.getElementById('sidebar');
  const avW = wrap.clientWidth  - sidebar.clientWidth;
  const avH = wrap.clientHeight;
  scale = Math.min(avW / (FIELD_W + 2 * MARGIN + GOAL_D * 2),
                   avH / (FIELD_H + 2 * MARGIN));
  scale = Math.max(0.3, scale);
  canvas.width  = Math.round((FIELD_W + 2 * MARGIN + GOAL_D * 2) * scale);
  canvas.height = Math.round((FIELD_H + 2 * MARGIN) * scale);
  if (lastState) draw(lastState);
}
window.addEventListener('resize', resize);

// Map physics coords ГўвЂ вЂ™ canvas pixels
// Physics: (0,0) = center. +x right, +y down.
function toC(x, y) {
  const ox = canvas.width  / 2;
  const oy = canvas.height / 2;
  return [ox + x * scale, oy + y * scale];
}
function s(v) { return v * scale; }  // scale a length

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
let lastState = null;

function draw(state) {
  lastState = state;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const FW = s(FIELD_W), FH = s(FIELD_H);
  const GH = s(GOAL_H),  GD = s(GOAL_D);
  const [cx, cy] = toC(0, 0);
  const fx = cx - FW / 2, fy = cy - FH / 2;

  // ГўвЂќв‚¬ГўвЂќв‚¬ Outer bg ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ГўвЂќв‚¬ГўвЂќв‚¬ Field shadow ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  ctx.shadowColor   = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur    = s(20);
  ctx.shadowOffsetY = s(4);
  ctx.fillStyle = '#2d7a2d';
  roundRect(fx, fy, FW, FH, s(4));
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur  = 0;
  ctx.shadowOffsetY = 0;

  // ГўвЂќв‚¬ГўвЂќв‚¬ Grass stripes (8 vertical bands) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  const BANDS = 8;
  const bandW = FW / BANDS;
  ctx.save(); ctx.beginPath(); roundRect(fx, fy, FW, FH, s(4)); ctx.clip();
  for (let i = 0; i < BANDS; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2d7a2d' : '#2a7028';
    ctx.fillRect(fx + i * bandW, fy, bandW, FH);
  }
  ctx.restore();

  // ГўвЂќв‚¬ГўвЂќв‚¬ Field border ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth   = Math.max(1.5, s(2));
  roundRect(fx, fy, FW, FH, s(4));
  ctx.stroke();

  // ГўвЂќв‚¬ГўвЂќв‚¬ Center line ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = Math.max(1, s(1.5));
  ctx.beginPath();
  ctx.moveTo(cx, fy);
  ctx.lineTo(cx, fy + FH);
  ctx.stroke();

  // ГўвЂќв‚¬ГўвЂќв‚¬ Center circle + spot ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  const CR = s(70);
  ctx.beginPath(); ctx.arc(cx, cy, CR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth   = Math.max(1, s(1.5));
  ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, s(4), 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();

  // ГўвЂќв‚¬ГўвЂќв‚¬ Goals ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  // Left goal (Red)
  const lgx = fx - GD, lgy = cy - GH / 2;
  drawGoal(lgx, lgy, GD, GH, '#FF4444', false);

  // Right goal (Blue)
  const rgx = fx + FW, rgy = cy - GH / 2;
  drawGoal(rgx, rgy, GD, GH, '#4488FF', true);

  // Goal lines on field
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth   = Math.max(1, s(1.5));
  // Left post-top to post-bottom on field edge
  ctx.beginPath(); ctx.moveTo(fx, lgy); ctx.lineTo(fx, lgy + GH); ctx.stroke();
  // Right
  ctx.beginPath(); ctx.moveTo(fx + FW, rgy); ctx.lineTo(fx + FW, rgy + GH); ctx.stroke();

  // ГўвЂќв‚¬ГўвЂќв‚¬ Players ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  for (const p of (state.players || [])) {
    const pm = playerMap[p.id];
    if (!pm) continue;
    const [px, py] = toC(p.x, p.y);
    drawPlayer(px, py, pm);
  }

  // ГўвЂќв‚¬ГўвЂќв‚¬ Ball ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  if (state.ball) {
    const [bx, by] = toC(state.ball.x, state.ball.y);
    drawBall(bx, by);
  }
}

function drawGoal(gx, gy, gw, gh, color, isRight) {
  // Net background
  ctx.fillStyle = color.replace(')', ',0.08)').replace('rgb', 'rgba').replace('#', 'rgba(') + '0.08)';
  // Simple approach:
  const r = parseInt(color.slice(1,3),16);
  const g2= parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  ctx.fillStyle = `rgba(${r},${g2},${b},0.1)`;
  ctx.fillRect(gx, gy, gw, gh);

  // Net grid
  ctx.strokeStyle = `rgba(${r},${g2},${b},0.2)`;
  ctx.lineWidth = Math.max(0.5, s(0.8));
  const nx = 4, ny = 4;
  for (let i = 1; i < nx; i++) {
    const x = gx + (gw / nx) * i;
    ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy + gh); ctx.stroke();
  }
  for (let j = 1; j < ny; j++) {
    const y = gy + (gh / ny) * j;
    ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx + gw, y); ctx.stroke();
  }

  // Goal frame (posts + crossbar)
  ctx.strokeStyle = `rgba(${r},${g2},${b},0.85)`;
  ctx.lineWidth = Math.max(1.5, s(2));
  const backX = isRight ? gx + gw : gx;
  const frontX = isRight ? gx : gx + gw;

  // Back wall
  ctx.beginPath(); ctx.moveTo(backX, gy); ctx.lineTo(backX, gy + gh); ctx.stroke();
  // Top bar
  ctx.beginPath(); ctx.moveTo(frontX, gy); ctx.lineTo(backX, gy); ctx.stroke();
  // Bottom bar
  ctx.beginPath(); ctx.moveTo(frontX, gy + gh); ctx.lineTo(backX, gy + gh); ctx.stroke();
}

function drawPlayer(px, py, pm) {
  const isRed  = pm.team === 1;
  const color  = isRed ? '#FF4444' : '#4488FF';
  const fill   = isRed ? '#cc1111' : '#1144cc';
  const r      = Math.max(8, s(15));

  // Drop shadow
  ctx.beginPath(); ctx.arc(px, py + s(3), r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();

  // Glow ring
  ctx.beginPath(); ctx.arc(px, py, r + s(3), 0, Math.PI * 2);
  ctx.fillStyle = isRed ? 'rgba(255,68,68,0.2)' : 'rgba(68,136,255,0.2)';
  ctx.fill();

  // Body
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = Math.max(1.5, s(2.5)); ctx.stroke();

  // Name label
  const label = (pm.avatar || pm.name.substring(0, 2)).toUpperCase();
  const fontSize = Math.max(7, Math.round(10 * scale));
  ctx.font = `bold ${fontSize}px Segoe UI`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = '#ffffff';
  ctx.fillText(label, px, py);
}

function drawBall(bx, by) {
  const br = Math.max(5, s(10));

  // Shadow
  ctx.beginPath(); ctx.arc(bx, by + s(2), br, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();

  // White body
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2);
  const grd = ctx.createRadialGradient(bx - br * 0.3, by - br * 0.3, br * 0.05,
                                        bx, by, br);
  grd.addColorStop(0, '#ffffff');
  grd.addColorStop(1, '#d0d0d0');
  ctx.fillStyle = grd; ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = Math.max(0.8, s(1)); ctx.stroke();

  // Pentagon center mark (simplified)
  ctx.beginPath(); ctx.arc(bx, by, br * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#333333'; ctx.fill();
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const reds = [], blues = [];
  for (const [id, p] of Object.entries(playerMap)) {
    if (p.team === 1) reds.push({ id, ...p });
    else if (p.team === 2) blues.push({ id, ...p });
  }

  if (reds.length) {
    const lbl = document.createElement('div');
    lbl.className = 'sidebar-label'; lbl.textContent = 'Red'; lbl.style.color = '#ff6b6b';
    sb.appendChild(lbl);
    for (const p of reds) sb.appendChild(makeChip(p, 'red'));
  }
  if (blues.length) {
    const lbl = document.createElement('div');
    lbl.className = 'sidebar-label'; lbl.textContent = 'Blue'; lbl.style.color = '#6ba4ff';
    lbl.style.marginTop = reds.length ? '8px' : '0';
    sb.appendChild(lbl);
    for (const p of blues) sb.appendChild(makeChip(p, 'blue'));
  }
}

function makeChip(p, cls) {
  const d = document.createElement('div');
  d.className = `player-chip ${cls}`;
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.background = cls === 'red' ? '#FF4444' : '#4488FF';
  dot.style.boxShadow   = `0 0 6px ${cls === 'red' ? '#FF4444' : '#4488FF'}`;
  d.appendChild(dot);
  const span = document.createElement('span');
  span.textContent = p.name;
  span.style.overflow     = 'hidden';
  span.style.textOverflow = 'ellipsis';
  d.appendChild(span);
  return d;
}

// WebSocket
// ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
function connect() {
  ws = new WebSocket(`ws://127.0.0.1:${location.port}`);

  ws.onopen = () => {
    document.getElementById('status').textContent = 'Connected';
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);

    if (msg.type === 'init') {
      totalFrames = msg.totalFrames;
      playerMap   = msg.playerMap || {};
      goals       = msg.goals    || [];
      document.getElementById('status').textContent = 'Ready';
      document.getElementById('seek').max = totalFrames;
      buildSidebar();
      resize();
      return;
    }

    if (msg.type === 'frame') {
      lastFrame = msg.f;
      if (!isSeeking) document.getElementById('seek').value = msg.f;
      updateTime(msg.f);
      draw(msg);
      checkGoals(msg.f);
    }
  };

  ws.onerror = () => document.getElementById('status').textContent = 'Error';

    document.getElementById('btn-play').classList.remove('active');
    document.getElementById('status').textContent = 'Disconnected';
  };
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  if (playing) {
    btn.textContent = 'ГўВЏВё Pause';
    btn.classList.add('active');
    ws.send(JSON.stringify({ cmd: 'play' }));
  } else {
    btn.textContent = 'ГўвЂ“В¶ Play';
    btn.classList.remove('active');
    ws.send(JSON.stringify({ cmd: 'pause' }));
  }
}

function onSeekInput(val) {
  isSeeking = true;
  updateTime(parseInt(val));
}

let seekTimer;
function onSeekCommit(val) {
  isSeeking = false;
  const frame = parseInt(val);
  clearTimeout(seekTimer);
  seekTimer = setTimeout(() => {
    ws.send(JSON.stringify({ cmd: 'seek', frame }));
    recountScore(frame);
  }, 80);
}

function setSpeed(v) {
  ws.send(JSON.stringify({ cmd: 'speed', v: parseFloat(v) }));
}

function recountScore(upTo) {
  redScore = blueScore = 0;
  for (const g of goals) {
    if (g.frameNo <= upTo) {
      if (g.teamId === 1) redScore++;
      else blueScore++;
    }
  }
  document.getElementById('score-red').textContent  = redScore;
  document.getElementById('score-blue').textContent = blueScore;
}

let flashTimer;
function checkGoals(f) {
  for (const g of goals) {
    if (g.frameNo > lastFrame - 5 && g.frameNo <= f) {
      recountScore(f);
      flashGoal(g.teamId);
    }
  }
}

function flashGoal(teamId) {
  const el = document.getElementById('goal-flash');
  el.textContent = 'GOAL!';
  el.style.color = teamId === 1 ? '#FF4444' : '#4488FF';
  el.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
