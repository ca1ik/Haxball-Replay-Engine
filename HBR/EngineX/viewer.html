<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaxReplay Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Score bar */
#score-bar {
  background: #111827;
  border-bottom: 1px solid #1f2937;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  height: 48px;
  flex-shrink: 0;
  position: relative;
  transition: height 0.2s, opacity 0.2s;
  overflow: hidden;
}
#score-bar.hidden { height: 0; opacity: 0; pointer-events: none; }
.team-block { display: flex; align-items: center; gap: 10px; padding: 0 20px; }
.team-name { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.85; }
.team-score { font-size: 26px; font-weight: 800; line-height: 1; }
.red-c  { color: #FF4444; }
.blue-c { color: #4488FF; }
.score-sep { font-size: 26px; font-weight: 300; color: #374151; padding: 0 14px; }
#status { position: absolute; right: 54px; font-size: 11px; color: #6b7280; letter-spacing: 0.5px; }

/* Canvas area */
#canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 0;
  background: #0d1117;
}
canvas { display: block; }

/* Sidebar */
#sidebar {
  position: absolute; right: 0; top: 0;
  width: 148px; height: 100%;
  background: rgba(13,17,23,0.92);
  border-left: 1px solid #1f2937;
  padding: 10px 6px;
  display: flex; flex-direction: column; gap: 3px;
  overflow-y: auto;
  transition: width 0.2s, opacity 0.2s;
}
#sidebar.hidden { width: 0; opacity: 0; padding: 0; overflow: hidden; pointer-events: none; }
.sidebar-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #4b5563; padding: 2px 8px 5px; }
.player-chip { padding: 5px 7px; border-radius: 6px; display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-chip.red  { background: rgba(255,68,68,0.1); color: #ff6b6b; border: 1px solid rgba(255,68,68,0.25); }
.player-chip.blue { background: rgba(68,136,255,0.1); color: #6ba4ff; border: 1px solid rgba(68,136,255,0.25); }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Goal flash */
#goal-flash {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 52px; font-weight: 900; letter-spacing: 6px;
  text-shadow: 0 0 40px currentColor, 0 0 80px currentColor;
  pointer-events: none; opacity: 0; transition: opacity 0.25s; z-index: 20;
}
#goal-flash.show { opacity: 1; }

/* Stats overlay */
#stats-overlay {
  position: absolute; top: 12px; left: 12px;
  background: rgba(10,14,20,0.72);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 12px 14px; min-width: 200px;
  z-index: 15; display: none; pointer-events: none;
}
#stats-overlay.visible { display: block; }
.stats-title { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #4b5563; margin-bottom: 8px; }
.poss-bar-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.poss-bar-bg { flex: 1; height: 6px; background: #1f2937; border-radius: 3px; overflow: hidden; }
.poss-bar-red { height: 100%; background: #FF4444; border-radius: 3px; transition: width 0.5s; }
.poss-label { font-size: 10px; font-weight: 700; min-width: 28px; text-align: center; }
.stats-goal-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 10px; cursor: pointer; }
.stats-goal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.stats-goal-row:hover { opacity: 0.75; }

/* Chatbot */
#chatbot-toggle {
  position: absolute; bottom: 14px; left: 14px;
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #7B5EA7, #4A6CF7);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; box-shadow: 0 2px 12px rgba(123,94,167,0.5);
  z-index: 30; transition: transform 0.15s;
}
#chatbot-toggle:hover { transform: scale(1.1); }
#chatbot-panel {
  position: absolute; bottom: 60px; left: 14px;
  width: 300px; max-height: 360px;
  background: rgba(10,14,20,0.92); backdrop-filter: blur(12px);
  border: 1px solid rgba(123,94,167,0.35); border-radius: 12px;
  display: none; flex-direction: column; z-index: 30; overflow: hidden;
}
#chatbot-panel.open { display: flex; }
#chatbot-header {
  padding: 10px 12px;
  background: rgba(123,94,167,0.15);
  border-bottom: 1px solid rgba(123,94,167,0.25);
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: #c4b3e8;
  display: flex; align-items: center; gap: 6px;
}
#chat-log {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 0; max-height: 240px;
}
.chat-msg { font-size: 11px; line-height: 1.45; border-radius: 7px; padding: 5px 8px; max-width: 90%; }
.chat-msg.user { background: rgba(123,94,167,0.3); align-self: flex-end; color: #e2d8f5; }
.chat-msg.bot  { background: rgba(30,39,55,0.9); align-self: flex-start; color: #d1d5db; white-space: pre-line; }
#chat-input-row { display: flex; gap: 5px; padding: 7px 8px; border-top: 1px solid rgba(255,255,255,0.07); }
#chat-input {
  flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: #e5e7eb; font-size: 11px; padding: 5px 8px; outline: none;
}
#chat-input:focus { border-color: rgba(123,94,167,0.6); }
#chat-send {
  background: linear-gradient(135deg, #7B5EA7, #4A6CF7);
  border: none; border-radius: 6px; color: #fff; padding: 5px 10px;
  cursor: pointer; font-size: 11px; font-weight: 600; flex-shrink: 0;
}

/* Controls */
#controls {
  background: #111827; border-top: 1px solid #1f2937;
  padding: 8px 16px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; height: 50px;
}
#btn-play {
  background: #1d4ed8; border: none; color: #fff; border-radius: 7px;
  padding: 0 14px; height: 30px; cursor: pointer; font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px; transition: background 0.15s; flex-shrink: 0;
}
#btn-play:hover { background: #2563eb; }
#btn-play.active { background: #059669; }
#timeline-wrap { flex: 1; position: relative; height: 30px; display: flex; align-items: center; }
#seek { width: 100%; height: 4px; cursor: pointer; accent-color: #3b82f6; border-radius: 2px; position: relative; z-index: 2; }
#timeline-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }
#time-label { font-size: 11px; color: #9ca3af; min-width: 110px; text-align: center; font-variant-numeric: tabular-nums; flex-shrink: 0; }
#speed-wrap { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #9ca3af; flex-shrink: 0; }
select { background: #1f2937; border: 1px solid #374151; color: #e5e7eb; border-radius: 5px; padding: 3px 5px; cursor: pointer; font-size: 11px; }

/* HBR Toolbar */
#hbr-toolbar { background: #0f1623; border-top: 1px solid #1f2937; flex-shrink: 0; }
.toolbar-row {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 14px; height: 38px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.toolbar-row:last-child { border-bottom: none; }
.tbr-sep { width: 1px; height: 20px; background: #1f2937; margin: 0 4px; }
.tbr-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 6px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
  border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
  background: rgba(255,255,255,0.05); color: #9ca3af;
  transition: all 0.15s; flex-shrink: 0; white-space: nowrap; height: 26px;
}
.tbr-btn:hover { background: rgba(255,255,255,0.1); color: #e5e7eb; }
.tbr-btn.active { background: rgba(123,94,167,0.25); color: #c4b3e8; border-color: rgba(123,94,167,0.4); }
.tbr-btn.goal-btn { background: rgba(74,108,247,0.15); color: #7fa8ff; border-color: rgba(74,108,247,0.35); }
.tbr-btn.goal-btn.active { background: rgba(74,108,247,0.3); }
.tbr-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #374151; padding: 0 4px; flex-shrink: 0; }
.tbr-spacer { flex: 1; }
.clip-time { font-size: 10px; color: #7B5EA7; font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; font-weight: 700; }
.clip-name-input {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 5px; color: #e5e7eb; font-size: 10px; padding: 3px 8px;
  outline: none; height: 26px; min-width: 0; flex: 1; max-width: 180px;
}
.clip-name-input:focus { border-color: rgba(123,94,167,0.5); }
.tbr-save { background: linear-gradient(135deg, #7B5EA7, #4A6CF7); color: #fff; border: none; }
.tbr-save:hover { opacity: 0.9; }

/* Goal popup */
#goal-popup {
  position: fixed;
  background: rgba(10,14,20,0.96); backdrop-filter: blur(12px);
  border: 1px solid rgba(74,108,247,0.35); border-radius: 10px;
  padding: 14px 16px; display: none; z-index: 100; min-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#goal-popup.visible { display: block; }
.popup-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #4b5563; margin-bottom: 10px; }
.goal-select { width: 100%; background: #1f2937; border: 1px solid #374151; color: #e5e7eb; border-radius: 6px; padding: 5px 8px; cursor: pointer; font-size: 11px; margin-bottom: 10px; }
.popup-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.popup-label { font-size: 10px; color: #6b7280; min-width: 80px; }
.popup-num { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; color: #e5e7eb; font-size: 11px; padding: 4px 8px; outline: none; width: 64px; text-align: center; }
.popup-num:focus { border-color: rgba(74,108,247,0.5); }
.popup-row-btns { display: flex; gap: 7px; margin-top: 4px; }
.popup-btn { flex: 1; padding: 7px; border: none; border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer; }
.popup-create { background: linear-gradient(135deg, #4A6CF7, #7B5EA7); color: #fff; }
.popup-cancel { background: rgba(255,255,255,0.08); color: #9ca3af; }

/* Toast */
#toast {
  position: fixed; bottom: 80px; right: 20px;
  background: rgba(10,14,20,0.92); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 8px 14px; font-size: 11px; color: #d1d5db;
  z-index: 200; display: none; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
#toast.success { border-color: rgba(5,150,105,0.5); color: #6ee7b7; }
#toast.error   { border-color: rgba(239,68,68,0.5);  color: #fca5a5; }
#toast.show    { display: block; }
</style>
</head>
<body>

<!-- Score bar (toggleable) -->
<div id="score-bar">
  <div class="team-block">
    <span class="team-name red-c">Red</span>
    <span class="team-score red-c" id="score-red">0</span>
  </div>
  <span class="score-sep">—</span>
  <div class="team-block">
    <span class="team-score blue-c" id="score-blue">0</span>
    <span class="team-name blue-c">Blue</span>
  </div>
  <div id="status">Connecting…</div>
</div>

<!-- Canvas + overlays -->
<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <div id="sidebar"></div>

  <div id="goal-flash"></div>

  <!-- Stats overlay -->
  <div id="stats-overlay">
    <div class="stats-title">Match Stats</div>
    <div class="poss-bar-wrap">
      <span class="poss-label red-c" id="poss-red-pct">50%</span>
      <div class="poss-bar-bg"><div class="poss-bar-red" id="poss-bar" style="width:50%"></div></div>
      <span class="poss-label blue-c" id="poss-blue-pct">50%</span>
    </div>
    <div id="stats-goals-list"></div>
  </div>

  <!-- Chatbot -->
  <button id="chatbot-toggle" title="Replay Assistant">💬</button>
  <div id="chatbot-panel">
    <div id="chatbot-header"><span>🤖</span><span>Replay Assistant</span></div>
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder='Ask e.g. "go to goal 2"' />
      <button id="chat-send">Send</button>
    </div>
  </div>
</div>

<!-- Playback controls -->
<div id="controls">
  <button id="btn-play" onclick="togglePlay()">▶ Play</button>
  <div id="timeline-wrap">
    <input id="seek" type="range" min="0" max="1" value="0" step="1"
           oninput="onSeekInput(this.value)" onchange="onSeekCommit(this.value)">
    <canvas id="timeline-canvas"></canvas>
  </div>
  <span id="time-label">0:00 / 0:00</span>
  <div id="speed-wrap">
    <span>Speed</span>
    <select id="speed" onchange="setSpeed(this.value)">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
      <option value="4">4×</option>
      <option value="8">8×</option>
    </select>
  </div>
</div>

<!-- HBR Toolbar -->
<div id="hbr-toolbar">
  <div class="toolbar-row">
    <span class="tbr-label">Clip</span>
    <button class="tbr-btn" id="btn-set-in"  onclick="setClipIn()"  title="Mark clip start at current frame">⬅ Set IN</button>
    <span class="clip-time" id="clip-in-time">—:——</span>
    <button class="tbr-btn" id="btn-set-out" onclick="setClipOut()" title="Mark clip end at current frame">Set OUT ➡</button>
    <span class="clip-time" id="clip-out-time">—:——</span>
    <input class="clip-name-input" id="clip-name" type="text" placeholder="clip_name" />
    <button class="tbr-btn tbr-save" onclick="saveClip()" title="Save clip">💾 Save</button>
    <div class="tbr-sep"></div>
    <span class="tbr-label">Goal</span>
    <button class="tbr-btn goal-btn" id="btn-goal-clip" onclick="toggleGoalPopup(event)" title="Create a goal clip">⚽ Goal Clip</button>
    <div class="tbr-sep"></div>
    <button class="tbr-btn" id="btn-stats" onclick="toggleStats()" title="Show/hide stats overlay">📊 Stats</button>
    <div class="tbr-spacer"></div>
    <span class="tbr-label">View</span>
    <button class="tbr-btn" id="btn-hide-score"   onclick="toggleScoreBar()" title="Show/hide score bar">📺 Score</button>
    <button class="tbr-btn" id="btn-hide-sidebar" onclick="toggleSidebar()"  title="Show/hide player list">👁 Players</button>
  </div>
</div>

<!-- Goal clip popup -->
<div id="goal-popup">
  <div class="popup-title">⚽ Goal Clip Creator</div>
  <select class="goal-select" id="goal-select"><option value="-1">— Select a goal —</option></select>
  <div class="popup-row">
    <span class="popup-label">⬅ Pre-goal (sec)</span>
    <input class="popup-num" id="popup-pre"  type="number" value="15"  min="1"   max="120" step="0.5">
  </div>
  <div class="popup-row">
    <span class="popup-label">Post-goal (sec) ➡</span>
    <input class="popup-num" id="popup-post" type="number" value="1.5" min="0.5" max="30"  step="0.5">
  </div>
  <div class="popup-row-btns">
    <button class="popup-btn popup-create" onclick="createGoalClip()">⚽ Create Clip</button>
    <button class="popup-btn popup-cancel" onclick="closeGoalPopup()">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let ws, totalFrames = 1, playing = false;
let playerMap = {}, goals = [];
let redScore = 0, blueScore = 0;
let lastFrame = 0;
let isSeeking = false;
let clipIn = -1, clipOut = -1;
let showStats = false;
let possRed = 0, possTotal = 0;

// ── Canvas / Field ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const FIELD_W = 760, FIELD_H = 520;
const GOAL_H  = 100, GOAL_D = 45;
const MARGIN  = 50;
let scale = 1;

function resize() {
  const wrap    = document.getElementById('canvas-wrap');
  const sidebar = document.getElementById('sidebar');
  const sideW   = sidebar.classList.contains('hidden') ? 0 : sidebar.offsetWidth;
  const avW = wrap.clientWidth - sideW;
  const avH = wrap.clientHeight;
  scale = Math.min(avW / (FIELD_W + 2 * MARGIN + GOAL_D * 2),
                   avH / (FIELD_H + 2 * MARGIN));
  scale = Math.max(0.3, scale);
  canvas.width  = Math.round((FIELD_W + 2 * MARGIN + GOAL_D * 2) * scale);
  canvas.height = Math.round((FIELD_H + 2 * MARGIN) * scale);
  resizeTimelineCanvas();
  if (lastState) drawFrame(lastState);
}
window.addEventListener('resize', resize);

// ── Timeline canvas (goal markers + clip region) ──────────────────────────────
const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx    = tlCanvas.getContext('2d');

function resizeTimelineCanvas() {
  const wrap = document.getElementById('timeline-wrap');
  tlCanvas.width  = wrap.clientWidth;
  tlCanvas.height = wrap.clientHeight;
  drawTimeline();
}

function drawTimeline() {
  const W = tlCanvas.width, H = tlCanvas.height;
  tlCtx.clearRect(0, 0, W, H);
  if (totalFrames <= 1) return;
  const padL = 8, padR = 8;
  const usableW = W - padL - padR;
  function fx(f) { return padL + (f / totalFrames) * usableW; }

  // Clip region
  if (clipIn >= 0 && clipOut > clipIn) {
    const x1 = fx(clipIn), x2 = fx(clipOut);
    tlCtx.fillStyle = 'rgba(123,94,167,0.22)';
    tlCtx.fillRect(x1, H * 0.15, x2 - x1, H * 0.7);
    tlCtx.fillStyle = '#9b72cf'; tlCtx.fillRect(x1 - 1, H * 0.05, 2, H * 0.9);
    tlCtx.fillStyle = '#4A6CF7'; tlCtx.fillRect(x2 - 1, H * 0.05, 2, H * 0.9);
  } else if (clipIn >= 0) {
    tlCtx.fillStyle = '#9b72cf';
    tlCtx.fillRect(fx(clipIn) - 1, H * 0.05, 2, H * 0.9);
  }

  // Goal markers (diamond)
  for (const g of goals) {
    const x = fx(g.frameNo);
    const color = g.teamId === 1 ? '#FF4444' : '#4488FF';
    const r = 5;
    tlCtx.save();
    tlCtx.translate(x, H / 2); tlCtx.rotate(Math.PI / 4);
    tlCtx.fillStyle = color; tlCtx.shadowColor = color; tlCtx.shadowBlur = 5;
    tlCtx.fillRect(-r / 2, -r / 2, r, r);
    tlCtx.restore();
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function toC(x, y) { return [canvas.width / 2 + x * scale, canvas.height / 2 + y * scale]; }
function s(v) { return v * scale; }

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w,y, x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h, x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h, x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y, x+r,y); ctx.closePath();
}

// ── Rendering (rAF-batched) ───────────────────────────────────────────────────
let lastState = null;
let rafPending = false;

function requestDraw(state) {
  lastState = state;
  if (!rafPending) {
    rafPending = true;
    requestAnimationFrame(() => { rafPending = false; drawFrame(lastState); });
  }
}

function drawFrame(state) {
  if (!state) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const FW = s(FIELD_W), FH = s(FIELD_H);
  const GH = s(GOAL_H),  GD = s(GOAL_D);
  const [cx, cy] = toC(0, 0);
  const fx = cx - FW / 2, fy = cy - FH / 2;

  // Background
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Field + shadow
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = s(18); ctx.shadowOffsetY = s(3);
  ctx.fillStyle = '#2d7a2d'; roundRect(fx, fy, FW, FH, s(4)); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Grass stripes
  ctx.save(); ctx.beginPath(); roundRect(fx, fy, FW, FH, s(4)); ctx.clip();
  const bw = FW / 8;
  for (let i = 0; i < 8; i++) { ctx.fillStyle = i%2===0 ? '#2d7a2d' : '#2a7028'; ctx.fillRect(fx+i*bw, fy, bw, FH); }
  ctx.restore();

  // Field border
  ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = Math.max(1.5, s(2));
  roundRect(fx, fy, FW, FH, s(4)); ctx.stroke();

  // Center line + circle
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = Math.max(1, s(1.5));
  ctx.beginPath(); ctx.moveTo(cx,fy); ctx.lineTo(cx,fy+FH); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, s(70), 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, s(4), 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();

  // Goals
  drawGoal(fx-GD, cy-GH/2, GD, GH, '#FF4444', false);
  drawGoal(fx+FW, cy-GH/2, GD, GH, '#4488FF', true);

  // Goal lines
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = Math.max(1,s(1.5));
  ctx.beginPath(); ctx.moveTo(fx,cy-GH/2); ctx.lineTo(fx,cy+GH/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fx+FW,cy-GH/2); ctx.lineTo(fx+FW,cy+GH/2); ctx.stroke();

  // Players + ball
  for (const p of (state.players||[])) {
    const pm = playerMap[p.id]; if (!pm) continue;
    const [px,py] = toC(p.x,p.y); drawPlayer(px,py,pm);
  }
  if (state.ball) { const [bx,by] = toC(state.ball.x,state.ball.y); drawBall(bx,by); }

  if (showStats) updatePossession(state);
}

function drawGoal(gx, gy, gw, gh, color, isRight) {
  const [r,g2,b] = [parseInt(color.slice(1,3),16), parseInt(color.slice(3,5),16), parseInt(color.slice(5,7),16)];
  ctx.fillStyle = `rgba(${r},${g2},${b},0.1)`; ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle = `rgba(${r},${g2},${b},0.85)`; ctx.lineWidth = Math.max(1.5,s(2));
  const bx = isRight ? gx+gw : gx, fx2 = isRight ? gx : gx+gw;
  ctx.beginPath(); ctx.moveTo(bx,gy); ctx.lineTo(bx,gy+gh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fx2,gy); ctx.lineTo(bx,gy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fx2,gy+gh); ctx.lineTo(bx,gy+gh); ctx.stroke();
}

function drawPlayer(px, py, pm) {
  const isRed = pm.team === 1;
  const color = isRed ? '#FF4444' : '#4488FF';
  const r = Math.max(8, s(15));
  ctx.beginPath(); ctx.arc(px, py+s(3), r, 0, Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();
  ctx.beginPath(); ctx.arc(px, py, r+s(3), 0, Math.PI*2); ctx.fillStyle=isRed?'rgba(255,68,68,0.2)':'rgba(68,136,255,0.2)'; ctx.fill();
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
  ctx.fillStyle = isRed ? '#cc1111' : '#1144cc'; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = Math.max(1.5,s(2.5)); ctx.stroke();
  const lbl = (pm.avatar || pm.name.substring(0,2)).toUpperCase();
  ctx.font = `bold ${Math.max(7,Math.round(10*scale))}px Segoe UI`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
  ctx.fillText(lbl, px, py);
}

function drawBall(bx, by) {
  const br = Math.max(5, s(10));
  ctx.beginPath(); ctx.arc(bx, by+s(2), br, 0, Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2);
  const grd = ctx.createRadialGradient(bx-br*0.3, by-br*0.3, br*0.05, bx, by, br);
  grd.addColorStop(0,'#ffffff'); grd.addColorStop(1,'#d0d0d0');
  ctx.fillStyle = grd; ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=Math.max(0.8,s(1)); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx, by, br*0.3, 0, Math.PI*2); ctx.fillStyle='#333'; ctx.fill();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updatePossession(state) {
  if (!state.ball || !state.players || state.players.length === 0) return;
  const bx = state.ball.x, by = state.ball.y;
  let closestDist = Infinity, closestTeam = 0;
  for (const p of state.players) {
    const pm = playerMap[p.id]; if (!pm || pm.team === 0) continue;
    const d = (p.x-bx)**2 + (p.y-by)**2;
    if (d < closestDist) { closestDist = d; closestTeam = pm.team; }
  }
  if (closestTeam === 1) possRed++;
  possTotal++;
  if (possTotal % 60 === 0) refreshPossUI();
}

function refreshPossUI() {
  const pct = possTotal > 0 ? Math.round((possRed/possTotal)*100) : 50;
  document.getElementById('poss-red-pct').textContent  = pct+'%';
  document.getElementById('poss-blue-pct').textContent = (100-pct)+'%';
  document.getElementById('poss-bar').style.width      = pct+'%';
}

function buildStatsGoalList() {
  const list = document.getElementById('stats-goals-list');
  list.innerHTML = '';
  goals.forEach((g, i) => {
    const row = document.createElement('div'); row.className = 'stats-goal-row';
    const dot = document.createElement('div'); dot.className = 'stats-goal-dot';
    dot.style.background = g.teamId===1 ? '#FF4444' : '#4488FF';
    const txt = document.createElement('span');
    txt.textContent = `Goal ${i+1} (${g.teamId===1?'Red':'Blue'}) — ${fmt(g.frameNo)}`;
    txt.style.color = g.teamId===1 ? '#ff8888' : '#88aaff';
    row.appendChild(dot); row.appendChild(txt);
    row.addEventListener('click', () => seekToFrame(g.frameNo));
    list.appendChild(row);
  });
}

function toggleStats() {
  showStats = !showStats;
  document.getElementById('stats-overlay').classList.toggle('visible', showStats);
  document.getElementById('btn-stats').classList.toggle('active', showStats);
  if (showStats) { possRed = 0; possTotal = 0; buildStatsGoalList(); }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const sb = document.getElementById('sidebar'); sb.innerHTML = '';
  const reds = [], blues = [];
  for (const [id, p] of Object.entries(playerMap)) {
    if (p.team===1) reds.push({id,...p}); else if (p.team===2) blues.push({id,...p});
  }
  function addGroup(arr, cls, label, clr) {
    if (!arr.length) return;
    const lbl = document.createElement('div'); lbl.className = 'sidebar-label';
    lbl.textContent = label; lbl.style.color = clr; sb.appendChild(lbl);
    arr.forEach(p => sb.appendChild(makeChip(p, cls)));
  }
  addGroup(reds,  'red',  'Red',  '#ff6b6b');
  addGroup(blues, 'blue', 'Blue', '#6ba4ff');
}

function makeChip(p, cls) {
  const d = document.createElement('div'); d.className = `player-chip ${cls}`;
  const dot = document.createElement('div'); dot.className = 'dot';
  dot.style.background  = cls==='red' ? '#FF4444' : '#4488FF';
  dot.style.boxShadow   = `0 0 5px ${cls==='red'?'#FF4444':'#4488FF'}`;
  const span = document.createElement('span'); span.textContent = p.name;
  span.style.overflow = 'hidden'; span.style.textOverflow = 'ellipsis';
  d.appendChild(dot); d.appendChild(span); return d;
}

// ── View toggles ──────────────────────────────────────────────────────────────
function toggleScoreBar() {
  const hidden = document.getElementById('score-bar').classList.toggle('hidden');
  const btn = document.getElementById('btn-hide-score');
  btn.classList.toggle('active', hidden);
  btn.textContent = hidden ? '📺 Score ✓' : '📺 Score';
}

function toggleSidebar() {
  const hidden = document.getElementById('sidebar').classList.toggle('hidden');
  const btn = document.getElementById('btn-hide-sidebar');
  btn.classList.toggle('active', hidden);
  btn.textContent = hidden ? '👁 Players ✓' : '👁 Players';
  setTimeout(resize, 220);
}

// ── Clip creator ──────────────────────────────────────────────────────────────
function setClipIn() {
  clipIn = lastFrame;
  document.getElementById('clip-in-time').textContent = fmt(clipIn);
  document.getElementById('btn-set-in').classList.add('active');
  drawTimeline();
  showToast(`IN set @ ${fmt(clipIn)}`, 'success');
}

function setClipOut() {
  if (clipIn < 0) { showToast('Set IN point first', 'error'); return; }
  if (lastFrame <= clipIn) { showToast('OUT must be after IN', 'error'); return; }
  clipOut = lastFrame;
  document.getElementById('clip-out-time').textContent = fmt(clipOut);
  document.getElementById('btn-set-out').classList.add('active');
  drawTimeline();
  showToast(`OUT set @ ${fmt(clipOut)}`, 'success');
}

function saveClip() {
  if (clipIn < 0 || clipOut <= clipIn) { showToast('Set valid IN/OUT first', 'error'); return; }
  const name = (document.getElementById('clip-name').value.trim() || 'clip') + '.hbr2';
  ws.send(JSON.stringify({ cmd: 'saveClip', inFrame: clipIn, outFrame: clipOut, name }));
  showToast('Saving…', '');
}

function resetClip() {
  clipIn = clipOut = -1;
  document.getElementById('clip-in-time').textContent  = '—:——';
  document.getElementById('clip-out-time').textContent = '—:——';
  document.getElementById('btn-set-in').classList.remove('active');
  document.getElementById('btn-set-out').classList.remove('active');
  drawTimeline();
}

// ── Goal clip popup ───────────────────────────────────────────────────────────
function buildGoalSelect() {
  const sel = document.getElementById('goal-select');
  sel.innerHTML = '<option value="-1">— Select a goal —</option>';
  goals.forEach((g, i) => {
    const opt = document.createElement('option'); opt.value = i;
    opt.textContent = `Goal ${i+1} — ${g.teamId===1?'Red':'Blue'} (${fmt(g.frameNo)})`;
    sel.appendChild(opt);
  });
}

function toggleGoalPopup(e) {
  const popup = document.getElementById('goal-popup');
  const btn   = document.getElementById('btn-goal-clip');
  if (popup.classList.contains('visible')) { closeGoalPopup(); return; }
  buildGoalSelect();
  const rect = btn.getBoundingClientRect();
  popup.style.left   = rect.left + 'px';
  popup.style.bottom = (window.innerHeight - rect.top + 6) + 'px';
  popup.classList.add('visible');
  btn.classList.add('active');
}

function closeGoalPopup() {
  document.getElementById('goal-popup').classList.remove('visible');
  document.getElementById('btn-goal-clip').classList.remove('active');
}

function createGoalClip() {
  const idx = parseInt(document.getElementById('goal-select').value);
  if (idx < 0 || idx >= goals.length) { showToast('Select a goal first', 'error'); return; }
  const pre  = parseFloat(document.getElementById('popup-pre').value)  || 15;
  const post = parseFloat(document.getElementById('popup-post').value) || 1.5;
  const g = goals[idx];
  const inF  = Math.max(0, g.frameNo - Math.round(pre  * 60));
  const outF = Math.min(totalFrames, g.frameNo + Math.round(post * 60));
  const name = `goal_${idx+1}_${g.teamId===1?'red':'blue'}.hbr2`;
  ws.send(JSON.stringify({ cmd: 'saveClip', inFrame: inF, outFrame: outF, name }));
  showToast(`Saving Goal ${idx+1} clip…`, '');
  closeGoalPopup();
}

document.addEventListener('click', e => {
  const popup = document.getElementById('goal-popup');
  const btn   = document.getElementById('btn-goal-clip');
  if (popup.classList.contains('visible') && !popup.contains(e.target) && e.target !== btn)
    closeGoalPopup();
});

// ── Chatbot ───────────────────────────────────────────────────────────────────
document.getElementById('chatbot-toggle').addEventListener('click', () =>
  document.getElementById('chatbot-panel').classList.toggle('open'));

document.getElementById('chat-send').addEventListener('click', sendChatMsg);
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key==='Enter') sendChatMsg(); });

function addChatMsg(text, type) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div'); div.className = `chat-msg ${type}`;
  div.textContent = text; log.appendChild(div); log.scrollTop = log.scrollHeight;
}

function sendChatMsg() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim(); if (!txt) return;
  inp.value = ''; addChatMsg(txt, 'user');
  setTimeout(() => addChatMsg(processCommand(txt.toLowerCase()), 'bot'), 180);
}

function processCommand(cmd) {
  const goalM = cmd.match(/goal\s*(\d+)/);
  if (goalM) {
    const idx = parseInt(goalM[1]) - 1;
    if (idx >= 0 && idx < goals.length) {
      seekToFrame(Math.max(0, goals[idx].frameNo - 5*60));
      return `↳ Goal ${idx+1}: ${goals[idx].teamId===1?'Red':'Blue'} scored at ${fmt(goals[idx].frameNo)}.`;
    }
    return `Goal ${goalM[1]} not found. This replay has ${goals.length} goal(s).`;
  }
  const timeM = cmd.match(/(\d+):(\d{2})/);
  if (timeM) { seekToFrame((parseInt(timeM[1])*60+parseInt(timeM[2]))*60); return `Seeked to ${timeM[0]}.`; }
  const clipM = cmd.match(/clip\s+(?:from\s+)?(\d+:\d{2})\s+(?:to\s+)?(\d+:\d{2})/);
  if (clipM) {
    const t = (ts) => { const [m,s]=ts.split(':').map(Number); return (m*60+s)*60; };
    clipIn = t(clipM[1]); clipOut = t(clipM[2]);
    document.getElementById('clip-in-time').textContent  = fmt(clipIn);
    document.getElementById('clip-out-time').textContent = fmt(clipOut);
    drawTimeline();
    return `Clip set ${clipM[1]}→${clipM[2]}. Click 💾 Save to export.`;
  }
  if (/stat|poss/.test(cmd)) { if (!showStats) toggleStats(); return 'Stats panel opened.'; }
  if (/score|result/.test(cmd)) return `Score: Red ${redScore} – ${blueScore} Blue.`;
  if (/goals|list/.test(cmd)) return goals.length ? goals.map((g,i)=>`Goal ${i+1}: ${g.teamId===1?'Red':'Blue'} @ ${fmt(g.frameNo)}`).join('\n') : 'No goals.';
  if (/duration|how long|length/.test(cmd)) return `Duration: ${fmt(totalFrames)}.`;
  if (/hide score/.test(cmd)) { toggleScoreBar(); return 'Score bar hidden.'; }
  if (/show score/.test(cmd)) { if(document.getElementById('score-bar').classList.contains('hidden'))toggleScoreBar(); return 'Score bar shown.'; }
  if (/hide player|hide sidebar/.test(cmd)) { toggleSidebar(); return 'Player list hidden.'; }
  if (/show player|show sidebar/.test(cmd)) { if(document.getElementById('sidebar').classList.contains('hidden'))toggleSidebar(); return 'Player list shown.'; }
  if (cmd==='play'||cmd==='start') { if(!playing) togglePlay(); return 'Playing.'; }
  if (cmd==='pause'||cmd==='stop') { if(playing) togglePlay(); return 'Paused.'; }
  if (cmd==='help'||cmd==='?') return 'Commands:\n• "goal 2" — jump to Goal 2\n• "5:30" — seek to 5:30\n• "clip from 5:00 to 7:30" — set clip\n• "stats" — show stats\n• "score" — current score\n• "goals" — list all goals\n• "duration" — total length\n• "hide/show score | players"';
  return 'Unknown command. Type "help" for commands.';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(`ws://127.0.0.1:${location.port}`);
  ws.onopen = () => { document.getElementById('status').textContent = 'Connected'; };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'init') {
      totalFrames = msg.totalFrames;
      playerMap   = msg.playerMap || {};
      goals       = msg.goals    || [];
      document.getElementById('status').textContent = 'Ready';
      document.getElementById('seek').max = totalFrames;
      buildSidebar(); buildGoalSelect(); buildStatsGoalList();
      resize(); resizeTimelineCanvas();
      addChatMsg(`Replay loaded — ${fmt(totalFrames)}, ${goals.length} goal(s). Type "help".`, 'bot');
      return;
    }
    if (msg.type === 'frame') {
      lastFrame = msg.f;
      if (!isSeeking) document.getElementById('seek').value = msg.f;
      updateTime(msg.f);
      requestDraw(msg);
      checkGoals(msg.f);
    }
    if (msg.type === 'clipSaved') { showToast(`✓ Saved: ${msg.name}`, 'success'); resetClip(); }
    if (msg.type === 'clipError') { showToast(`✗ ${msg.message}`, 'error'); }
  };
  ws.onerror = () => document.getElementById('status').textContent = 'Error';
  ws.onclose = () => {
    playing = false;
    const btn = document.getElementById('btn-play');
    btn.textContent = '▶ Play'; btn.classList.remove('active');
    document.getElementById('status').textContent = 'Disconnected';
  };
}

// ── Playback ──────────────────────────────────────────────────────────────────
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  if (playing) { btn.textContent='⏸ Pause'; btn.classList.add('active'); ws.send(JSON.stringify({cmd:'play'})); }
  else          { btn.textContent='▶ Play';  btn.classList.remove('active'); ws.send(JSON.stringify({cmd:'pause'})); }
}

function onSeekInput(val) { isSeeking = true; updateTime(parseInt(val)); }

let seekTimer;
function onSeekCommit(val) {
  isSeeking = false;
  const frame = parseInt(val);
  clearTimeout(seekTimer);
  seekTimer = setTimeout(() => seekToFrame(frame), 80);
}

function seekToFrame(frame) {
  frame = Math.max(0, Math.min(totalFrames, frame));
  document.getElementById('seek').value = frame;
  ws.send(JSON.stringify({ cmd: 'seek', frame }));
  recountScore(frame);
}

function setSpeed(v) { ws.send(JSON.stringify({ cmd: 'speed', v: parseFloat(v) })); }

// ── Time / Score ──────────────────────────────────────────────────────────────
function fmt(frames) { const s=Math.floor(frames/60); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function updateTime(f) { document.getElementById('time-label').textContent = `${fmt(f)} / ${fmt(totalFrames)}`; }

function recountScore(upTo) {
  redScore = blueScore = 0;
  for (const g of goals) { if (g.frameNo <= upTo) { if (g.teamId===1) redScore++; else blueScore++; } }
  document.getElementById('score-red').textContent  = redScore;
  document.getElementById('score-blue').textContent = blueScore;
}

let flashTimer;
function checkGoals(f) {
  for (const g of goals) {
    if (g.frameNo > lastFrame-5 && g.frameNo <= f) { recountScore(f); flashGoal(g.teamId); }
  }
}
function flashGoal(teamId) {
  const el = document.getElementById('goal-flash');
  el.textContent = 'GOAL!'; el.style.color = teamId===1 ? '#FF4444' : '#4488FF';
  el.classList.add('show'); clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show${type?' '+type:''}`;
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  resize(); resizeTimelineCanvas(); connect();
  document.getElementById('seek').addEventListener('input', () => requestAnimationFrame(drawTimeline));
};
</script>
